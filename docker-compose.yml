services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gbrain}
      POSTGRES_USER: ${POSTGRES_USER:-gbrain}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gbrain}"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - gbrain-net

  gbrain:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        GBRAIN_REF: ${GBRAIN_REF:-latest}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${GBRAIN_PORT:-3000}:3000"
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-gbrain}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-gbrain}
      GBRAIN_HTTP_PORT: "3000"
      GBRAIN_HOST: "0.0.0.0"
      # Embedding provider — pick one
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ZEROENTROPY_API_KEY: ${ZEROENTROPY_API_KEY:-}
      VOYAGE_API_KEY: ${VOYAGE_API_KEY:-}
      # Embedding config (defaults: zeroentropy:zembed-1, 1280d)
      GBRAIN_EMBEDDING_MODEL: ${GBRAIN_EMBEDDING_MODEL:-}
      GBRAIN_EMBEDDING_DIMENSIONS: ${GBRAIN_EMBEDDING_DIMENSIONS:-}
      # OAuth / DCR admin secret
      GBRAIN_ADMIN_SECRET: ${GBRAIN_ADMIN_SECRET:?GBRAIN_ADMIN_SECRET is required}
    volumes:
      - brain-repo:/home/gbrain/.gbrain
    networks:
      - gbrain-net

volumes:
  pgdata:
  brain-repo:

networks:
  gbrain-net:
