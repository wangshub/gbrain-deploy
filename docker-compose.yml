services:
  postgres:
    image: ${POSTGRES_IMAGE:-pgvector/pgvector:pg16}
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gbrain}
      POSTGRES_USER: ${POSTGRES_USER:-gbrain}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gbrain}"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - gbrain-net

  ollama:
    image: ${OLLAMA_IMAGE:-ollama/ollama:latest}
    profiles:
      - ollama
    restart: unless-stopped
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - gbrain-net

  gbrain:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        GBRAIN_REF: ${GBRAIN_REF:-master}
        BUN_IMAGE: ${BUN_IMAGE:-oven/bun:1}
        APT_MIRROR: ${APT_MIRROR:-}
        NPM_REGISTRY: ${NPM_REGISTRY:-}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${GBRAIN_BIND_ADDR:-127.0.0.1}:${GBRAIN_PORT:-3000}:3000"
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-gbrain}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-gbrain}
      GBRAIN_HTTP_PORT: "3000"
      GBRAIN_HOST: "0.0.0.0"
      # LLM
      LLM_API_BASE: ${LLM_API_BASE:-}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-}
      # Embedding — standard provider keys
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      ZEROENTROPY_API_KEY: ${ZEROENTROPY_API_KEY:-}
      VOYAGE_API_KEY: ${VOYAGE_API_KEY:-}
      # Embedding — gbrain init args
      EMBEDDING_GBRAIN_SPEC: ${EMBEDDING_GBRAIN_SPEC:-}
      EMBEDDING_DIM: ${EMBEDDING_DIM:-}
      # Ollama
      OLLAMA_HOST: ${OLLAMA_HOST:-http://ollama:11434}
      OLLAMA_EMBED_MODEL: ${OLLAMA_EMBED_MODEL:-}
      # Admin
      GBRAIN_ADMIN_BOOTSTRAP_TOKEN: ${GBRAIN_ADMIN_SECRET:-}
      # Git sync
      BRAIN_GIT_REMOTE: ${BRAIN_GIT_REMOTE:-}
      BRAIN_GIT_BRANCH: ${BRAIN_GIT_BRANCH:-main}
      BRAIN_GIT_TOKEN: ${BRAIN_GIT_TOKEN:-}
      BRAIN_GIT_USER: ${BRAIN_GIT_USER:-gbrain}
      BRAIN_GIT_EMAIL: ${BRAIN_GIT_EMAIL:-gbrain@localhost}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - brain-data:/root/.gbrain
    networks:
      - gbrain-net
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3000/health"]
      interval: 10s
      timeout: 3s
      retries: 12

  caddy:
    image: ${CADDY_IMAGE:-caddy:2}
    profiles:
      - caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:-}
      ACME_EMAIL: ${ACME_EMAIL:-}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - gbrain
    networks:
      - gbrain-net

volumes:
  pgdata:
  brain-data:
  ollama-data:
  caddy_data:
  caddy_config:

networks:
  gbrain-net:
