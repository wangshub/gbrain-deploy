services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gbrain}
      POSTGRES_USER: ${POSTGRES_USER:-gbrain}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gbrain}"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - gbrain-net

  ollama:
    image: ollama/ollama:latest
    profiles:
      - ollama
    restart: unless-stopped
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - gbrain-net

  gbrain:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        GBRAIN_REF: ${GBRAIN_REF:-master}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${GBRAIN_PORT:-3000}:3000"
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-gbrain}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-gbrain}
      GBRAIN_HTTP_PORT: "3000"
      GBRAIN_HOST: "0.0.0.0"
      # LLM
      LLM_API_BASE: ${LLM_API_BASE:-}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-}
      # Embedding — standard provider keys
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      ZEROENTROPY_API_KEY: ${ZEROENTROPY_API_KEY:-}
      VOYAGE_API_KEY: ${VOYAGE_API_KEY:-}
      # Embedding — gbrain init args
      EMBEDDING_GBRAIN_SPEC: ${EMBEDDING_GBRAIN_SPEC:-}
      EMBEDDING_DIM: ${EMBEDDING_DIM:-}
      # Ollama
      OLLAMA_HOST: ${OLLAMA_HOST:-http://ollama:11434}
      # Admin
      GBRAIN_ADMIN_SECRET: ${GBRAIN_ADMIN_SECRET:?GBRAIN_ADMIN_SECRET is required}
    volumes:
      - brain-repo:/root/.gbrain
    networks:
      - gbrain-net

volumes:
  pgdata:
  brain-repo:
  ollama-data:

networks:
  gbrain-net:
